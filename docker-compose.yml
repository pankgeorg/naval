# Dev config (default) — hot-reload on both backend and frontend
# Usage: docker compose up --build

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: maritime
      POSTGRES_USER: maritime
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "25432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maritime"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://maritime:${DB_PASSWORD:-changeme}@db:5432/maritime
      JWT_SECRET: ${JWT_SECRET:-supersecretdev}
      ALLOW_ANONYMOUS: "true"
      SEED_ON_STARTUP: "true"
    volumes:
      - ./backend/app:/app/app
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      API_URL: http://api:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend

volumes:
  pgdata:
